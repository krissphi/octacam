<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#00ff66"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer Rounded Shield -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="8"/>

  <!-- Camera Outer Ring (Octagon Aperture Style) -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="url(#glowGrad)" stroke-width="14" filter="url(#glow)" opacity="0.85"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#lensGrad)" stroke-width="18"/>

  <!-- Aperture Blades / Octa Shape -->
  <polygon points="256,120 352,160 392,256 352,352 256,392 160,352 120,256 160,160" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="6"/>

  <!-- Inner Shutter Lens -->
  <circle cx="256" cy="256" r="85" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="70" fill="url(#lensGrad)" opacity="0.9"/>
  <circle cx="230" cy="230" r="24" fill="#ffffff" opacity="0.6"/>

  <!-- REC Dot -->
  <circle cx="395" cy="117" r="22" fill="#ef4444"/>
  <circle cx="395" cy="117" r="12" fill="#ffffff" opacity="0.8"/>
</svg>
